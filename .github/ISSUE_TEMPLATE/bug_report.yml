name: Bug report
description: Report a defect in clawfile CLI
title: "bug: "
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Tell us what failed and what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      placeholder: |
        1. clawfile install Clawfile
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: clawfile version
      placeholder: 0.1.0
